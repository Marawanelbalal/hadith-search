<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Hadith Search</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@200..800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#00210d",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-high": "#eae8e5",
                        "on-secondary-fixed-variant": "#584400",
                        "tertiary-container": "#b91a20",
                        "background": "#fbf9f6",
                        "on-secondary-container": "#775e00",
                        "outline": "#707a70",
                        "on-secondary-fixed": "#241a00",
                        "primary": "#005129",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1c1a",
                        "outline-variant": "#bfc9be",
                        "on-surface": "#1b1c1a",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "surface-container-highest": "#e4e2df",
                        "primary-container": "#1a6b3c",
                        "tertiary-fixed": "#ffdad6",
                        "on-primary-fixed-variant": "#005229",
                        "surface-container-low": "#f5f3f0",
                        "inverse-primary": "#89d89e",
                        "error-container": "#ffdad6",
                        "secondary-container": "#fdd977",
                        "error": "#ba1a1a",
                        "surface-tint": "#1b6c3d",
                        "on-tertiary-container": "#ffcbc6",
                        "surface-variant": "#e4e2df",
                        "tertiary": "#92000f",
                        "surface-dim": "#dbdad7",
                        "secondary-fixed": "#ffe08c",
                        "secondary": "#745b00",
                        "on-primary-container": "#9ae9ae",
                        "surface-container": "#efeeeb",
                        "surface-bright": "#fbf9f6",
                        "on-surface-variant": "#404940",
                        "primary-fixed-dim": "#89d89e",
                        "secondary-fixed-dim": "#e5c363",
                        "inverse-surface": "#30312f",
                        "on-tertiary-fixed": "#410003",
                        "on-tertiary-fixed-variant": "#930010",
                        "surface": "#fbf9f6",
                        "inverse-on-surface": "#f2f0ed",
                        "primary-fixed": "#a5f4b8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "container-max-width": "1200px"
                    },
                    "fontFamily": {
                        "display-lg": ["Newsreader"],
                        "ui-caption": ["Manrope"],
                        "ui-label": ["Manrope"],
                        "body-main": ["Newsreader"],
                        "body-arabic": ["Amiri", "Newsreader"],
                        "h1-hadith": ["Newsreader"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "ui-caption": ["12px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "ui-label": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-main": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-arabic": ["28px", { "lineHeight": "1.8", "fontWeight": "400" }],
                        "h1-hadith": ["32px", { "lineHeight": "1.4", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .girih-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0l2.5 17.5L40 20l-17.5 2.5L20 40l-2.5-17.5L0 20l17.5-2.5z' fill='%23e5c363' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-main text-body-main antialiased selection:bg-primary-container selection:text-on-primary-container">
    <div id="root" class="h-full w-full flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

        // Components
        const Header = () => {
            const location = useLocation();
            const isDark = location.pathname === '/loading';

            if (isDark) return null;

            return (
                <header className="bg-white dark:bg-stone-950 font-newsreader text-stone-900 dark:text-stone-100 docked full-width top-0 border-b border-stone-200 dark:border-stone-800 transition-all duration-200 ease-in-out sticky z-50">
                    <div className="flex justify-between items-center w-full px-6 py-4 max-w-[1200px] mx-auto">
                        <Link to="/" className="text-2xl font-bold tracking-tight text-emerald-900 dark:text-emerald-500 flex items-center gap-2">
                            <span className="material-symbols-outlined fill text-primary">star</span>
                            Hadith Search
                        </Link>
                        <nav className="hidden md:flex gap-8 items-center font-ui-label text-ui-label">
                            <Link to="/results" className="text-stone-600 dark:text-stone-400 hover:text-emerald-700 dark:hover:text-emerald-300 transition-colors py-2 px-1 hover:bg-stone-50 dark:hover:bg-stone-900/50">Search</Link>
                            <Link to="/benchmarks" className="text-stone-600 dark:text-stone-400 hover:text-emerald-700 dark:hover:text-emerald-300 transition-colors py-2 px-1 hover:bg-stone-50 dark:hover:bg-stone-900/50">Benchmarks</Link>
                            <Link to="/dev" className="text-stone-600 dark:text-stone-400 hover:text-emerald-700 dark:hover:text-emerald-300 transition-colors py-2 px-1 hover:bg-stone-50 dark:hover:bg-stone-900/50">Algorithm Comparison</Link>
                        </nav>
                        <div className="flex items-center gap-4">
                             <Link to="/loading" className="text-on-surface-variant hover:text-primary p-2 rounded-full transition-colors flex items-center justify-center">
                                <span className="material-symbols-outlined">refresh</span>
                            </Link>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            const location = useLocation();
            const isDark = location.pathname === '/loading';

            if (isDark) return null;

            return (
                <footer className="bg-surface-container-lowest text-on-surface w-full border-t border-surface-container-high py-8 px-6 flex flex-col md:flex-row justify-between items-center gap-4 mt-auto font-ui-caption text-ui-caption uppercase tracking-widest">
                    <p className="text-on-surface-variant">© 2024 Hadith Search. Sacred Minimalism in Digital Scholarship.</p>
                    <nav className="flex gap-6">
                        <a className="text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">About</a>
                        <a className="text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">Methodology</a>
                        <a className="text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">Privacy</a>
                        <a className="text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">API</a>
                    </nav>
                </footer>
            );
        };

        // Screens
        const HomePage = () => {
            const navigate = useNavigate();

            const handleSearch = () => {
                navigate('/results');
            };

            return (
                <main className="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-20 w-full max-w-container-max-width mx-auto relative">
                    <div className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container-low via-background to-background opacity-50 -z-10"></div>
                    <div className="text-center max-w-3xl flex flex-col items-center gap-8 mb-12">
                        <div className="w-16 h-16 bg-secondary-container rounded-sm rotate-45 flex items-center justify-center mb-4">
                            <div className="w-12 h-12 border border-on-secondary-container rotate-[-45deg] bg-background"></div>
                        </div>
                        <h1 className="font-display-lg text-display-lg text-primary tracking-tight">Hadith Search</h1>
                        <p className="font-body-main text-body-main text-on-surface-variant max-w-2xl mx-auto">
                            Search across 33,000+ authenticated prophetic narrations.
                        </p>
                    </div>
                    <div className="w-full max-w-4xl flex flex-col items-center gap-6">
                        <div className="relative w-full group">
                            <div className="absolute inset-y-0 left-6 flex items-center pointer-events-none">
                                <span className="material-symbols-outlined text-secondary fill">search</span>
                            </div>
                            <input className="w-full h-16 pl-16 pr-6 rounded-full border-2 border-outline-variant bg-surface-lowest text-on-surface font-ui-label text-ui-label focus:border-secondary focus:ring-4 focus:ring-secondary-container/30 transition-all shadow-sm placeholder:text-outline placeholder:font-normal" placeholder="Search narrators, topics, or exact phrases..." type="text" onKeyDown={(e) => e.key === 'Enter' && handleSearch()}/>
                            <button onClick={handleSearch} className="absolute inset-y-2 right-2 px-6 bg-primary text-on-primary rounded-full font-ui-label text-ui-label hover:bg-on-primary-fixed-variant transition-colors flex items-center gap-2">
                                Search
                            </button>
                        </div>
                        <div className="w-full flex flex-col gap-6 mt-4">
                            <div className="flex flex-wrap items-center justify-center gap-3">
                                <span className="font-ui-caption text-ui-caption text-on-surface-variant uppercase tracking-wider mr-2">Grade:</span>
                                <button className="px-4 py-2 rounded-full bg-surface-container-high text-on-surface font-ui-label text-ui-label hover:bg-surface-variant transition-colors border border-outline-variant">All</button>
                                <button className="px-4 py-2 rounded-full bg-primary text-on-primary font-ui-label text-ui-label shadow-sm hover:opacity-90 transition-opacity">Sahih</button>
                                <button className="px-4 py-2 rounded-full bg-secondary-container text-on-secondary-container font-ui-label text-ui-label shadow-sm hover:opacity-90 transition-opacity border border-secondary">Hasan</button>
                                <button className="px-4 py-2 rounded-full bg-error text-on-error font-ui-label text-ui-label shadow-sm hover:opacity-90 transition-opacity">Da'if</button>
                            </div>
                        </div>
                    </div>
                </main>
            );
        };

        const ResultsPage = () => {
            return (
                <main className="flex-grow w-full max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop py-8 flex flex-col gap-8">
                    <div className="flex items-center justify-between border-b border-surface-variant pb-4 mt-4">
                        <p className="font-ui-caption text-ui-caption text-on-surface-variant uppercase tracking-wider">Showing 42 Results for "prayer times"</p>
                        <div className="flex items-center gap-2 font-ui-label text-ui-label text-on-surface-variant">
                            <span>Sort by:</span>
                            <select className="bg-transparent border-none text-on-surface focus:ring-0 cursor-pointer font-ui-label">
                                <option>Relevance</option>
                                <option>Authenticity</option>
                            </select>
                        </div>
                    </div>
                    <div className="flex flex-col gap-8">
                        <article className="bg-surface-container-lowest border border-outline-variant rounded-lg p-6 md:p-8 flex flex-col gap-6 hover:shadow-[0_4px_20px_rgba(0,81,41,0.05)] hover:border-primary-container transition-all duration-300">
                            <div className="flex justify-between items-start border-b border-surface-variant pb-4">
                                <div className="flex flex-col gap-1">
                                    <span className="font-ui-caption text-ui-caption text-on-surface-variant uppercase tracking-widest">Sahih Bukhari</span>
                                    <h2 className="font-h1-hadith text-h1-hadith text-on-surface">Book 9, Hadith 5</h2>
                                </div>
                                <span className="bg-primary text-on-primary font-ui-label text-ui-label px-3 py-1 rounded-full uppercase">Sahih</span>
                            </div>
                            <div className="flex flex-col gap-8">
                                <p className="font-body-arabic text-body-arabic text-on-surface text-right leading-[2.2]" dir="rtl">
                                    حَدَّثَنَا عَبْدُ اللَّهِ بْنُ يُوسُفَ، قَالَ أَخْبَرَنَا مَالِكٌ، عَنْ أَبِي الزِّنَادِ، عَنِ الأَعْرَجِ، عَنْ أَبِي هُرَيْرَةَ، أَنَّ رَسُولَ اللَّهِ صلى الله عليه وسلم قَالَ ‏ "‏ يَتَعَاقَبُونَ فِيكُمْ مَلاَئِكَةٌ بِاللَّيْلِ وَمَلاَئِكَةٌ بِالنَّهَارِ، وَيَجْتَمِعُونَ فِي صَلاَةِ الْفَجْرِ وَصَلاَةِ الْعَصْرِ... ‏"‏
                                </p>
                                <div className="flex flex-col gap-2">
                                    <p className="font-body-main text-body-main text-on-surface leading-relaxed">
                                        Narrated Abu Huraira: Allah's Messenger (ﷺ) said, "Angels come to you in succession by night and day and all of them get together at the time of the Fajr and 'Asr prayers..."
                                    </p>
                                </div>
                            </div>
                        </article>
                    </div>
                </main>
            );
        };

        const DevModePage = () => {
            return (
                 <div className="flex flex-1 pt-0 h-full w-full max-w-full">
                    <main className="flex-1 bg-background p-gutter min-h-screen girih-bg w-full">
                        <div className="bg-surface-container-low rounded-xl p-4 mb-gutter border border-outline-variant flex items-center justify-between shadow-sm">
                            <div className="flex items-center gap-6">
                                <div className="flex flex-col">
                                    <label className="font-ui-caption text-ui-caption text-on-surface-variant mb-1">Base Query</label>
                                    <div className="font-ui-label text-ui-label text-on-surface">"purification before prayer"</div>
                                </div>
                            </div>
                            <div className="text-on-surface-variant font-ui-caption text-ui-caption flex items-center gap-2">
                                <span className="material-symbols-outlined text-sm">info</span> Comparing top 100 results
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-0 border border-outline-variant rounded-xl overflow-hidden bg-surface">
                            <div className="flex flex-col relative border-r border-outline-variant">
                                <div className="bg-surface-container-low border-b border-outline-variant p-4 flex justify-between items-center shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="w-6 h-6 rounded-full bg-primary text-on-primary flex items-center justify-center font-ui-label text-ui-caption">A</div>
                                        <h3 className="font-h1-hadith text-lg text-primary">BM25 + PRF</h3>
                                    </div>
                                </div>
                                <div className="p-4 space-y-4">
                                     <div className="group relative bg-surface border border-outline-variant rounded-lg p-5 hover:shadow-md transition-all duration-300">
                                        <div className="mb-3 flex items-center gap-2">
                                            <span className="bg-primary text-on-primary font-ui-label text-ui-caption uppercase px-2 py-0.5 rounded-full">Sahih</span>
                                        </div>
                                        <p className="font-body-main text-body-main text-on-surface mb-4">
                                            "The prayer of none of you is accepted if he passes wind till he performs the ablution (Wudu)."
                                        </p>
                                     </div>
                                </div>
                            </div>

                            <div className="flex flex-col relative">
                                <div className="bg-surface-container-low border-b border-outline-variant p-4 flex justify-between items-center shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="w-6 h-6 rounded-full bg-secondary-fixed-dim text-on-secondary-fixed flex items-center justify-center font-ui-label text-ui-caption">B</div>
                                        <h3 className="font-h1-hadith text-lg text-on-surface">Neural Bi-Encoder</h3>
                                    </div>
                                </div>
                                <div className="p-4 space-y-4 bg-surface-container-lowest">
                                    <div className="group relative bg-surface border border-outline-variant rounded-lg p-5 hover:shadow-md transition-all duration-300">
                                         <div className="mb-3 flex items-center gap-2">
                                            <span className="bg-primary text-on-primary font-ui-label text-ui-caption uppercase px-2 py-0.5 rounded-full">Sahih</span>
                                        </div>
                                        <p className="font-body-main text-body-main text-on-surface mb-4">
                                            "Purity is half of iman (faith)."
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const BenchmarksPage = () => {
            return (
                <main className="flex-grow w-full max-w-[container-max-width] mx-auto px-margin-mobile md:px-margin-desktop py-12 flex flex-col gap-16">
                    <div className="flex flex-col gap-4 max-w-3xl">
                        <h1 className="font-display-lg text-display-lg text-primary">Algorithm Benchmarks</h1>
                        <p className="font-body-main text-body-main text-on-surface-variant">
                            Comprehensive evaluation of retrieval algorithms against verified gold standard datasets (qrels).
                        </p>
                    </div>

                    <section className="flex flex-col gap-6">
                        <div className="flex items-center gap-4 border-b border-outline-variant pb-2">
                            <h2 className="font-h1-hadith text-h1-hadith text-on-surface">Algorithm Performance</h2>
                        </div>
                        <div className="overflow-x-auto rounded-lg border border-outline-variant bg-surface-container-lowest">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-surface-container-low font-ui-label text-ui-label text-on-surface border-b border-outline-variant">
                                        <th className="p-4 py-3 font-semibold">Algorithm</th>
                                        <th className="p-4 py-3 font-semibold text-right">MAP</th>
                                    </tr>
                                </thead>
                                <tbody className="font-body-main text-body-main text-on-surface divide-y divide-outline-variant">
                                    <tr className="hover:bg-surface-container transition-colors">
                                        <td className="p-4 font-semibold text-primary">Cross-Encoder</td>
                                        <td className="p-4 text-right bg-primary-fixed text-on-primary-fixed font-medium">0.842</td>
                                    </tr>
                                     <tr className="hover:bg-surface-container transition-colors">
                                        <td className="p-4 font-medium text-on-surface-variant">BM25 (Lucene)</td>
                                        <td className="p-4 text-right text-on-surface-variant">0.654</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </main>
            );
        };

        const LoadingPage = () => {
             const navigate = useNavigate();
             
             useEffect(() => {
                 const timer = setTimeout(() => {
                     navigate('/');
                 }, 2000);
                 return () => clearTimeout(timer);
             }, [navigate]);

            return (
                <div className="h-screen w-full bg-primary-container m-0 p-0 overflow-hidden flex items-center justify-center relative absolute inset-0 z-50">
                    <div className="flex flex-col items-center justify-center z-10 p-8 space-y-8">
                        <div className="relative w-16 h-16 flex items-center justify-center animate-spin" style={{ animationDuration: '3s' }}>
                            <svg className="w-full h-full text-secondary-fixed" viewBox="0 0 100 100">
                                <path d="M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z" fill="none" stroke="currentColor" strokeLinejoin="round" strokeWidth="4"></path>
                            </svg>
                        </div>
                        <div className="flex flex-col items-center space-y-2">
                            <h1 className="font-display-lg text-display-lg text-on-primary tracking-tight text-center">
                                Hadith Search
                            </h1>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <div className="flex flex-col min-h-screen">
                        <Header />
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/results" element={<ResultsPage />} />
                            <Route path="/dev" element={<DevModePage />} />
                            <Route path="/benchmarks" element={<BenchmarksPage />} />
                            <Route path="/loading" element={<LoadingPage />} />
                        </Routes>
                        <Footer />
                    </div>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
